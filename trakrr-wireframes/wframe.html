<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trakrr — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/shell.css">
</head>
<body>
<div class="app">
  <aside class="nav">
    <div class="brand">
      <div class="mark"></div>
      <div class="name">TRAKRR</div>
    </div>
    <p class="sub">wireframes · v1</p>

    <div class="group">
      <div class="group-label">Foundation</div>
      <button class="tab active" data-src="tabs/00-system.html"><span class="n">00</span> System & language</button>
      <button class="tab" data-src="tabs/12-map.html"><span class="n">12</span> App map / IA</button>
    </div>

    <div class="group">
      <div class="group-label">Flows</div>
      <button class="tab" data-src="tabs/01-auth.html"><span class="n">01</span> Auth & onboarding</button>
      <button class="tab" data-src="tabs/02-feed.html"><span class="n">02</span> Feed</button>
      <button class="tab" data-src="tabs/03-race.html"><span class="n">03</span> Race (the cathedral)</button>
      <button class="tab" data-src="tabs/04-history.html"><span class="n">04</span> History</button>
      <button class="tab" data-src="tabs/05-profile.html"><span class="n">05</span> Profile</button>
      <button class="tab" data-src="tabs/06-social.html"><span class="n">06</span> Public profile + follow</button>
      <button class="tab" data-src="tabs/07-settings.html"><span class="n">07</span> Settings & modals</button>
    </div>

    <div class="group">
      <div class="group-label">Watch</div>
      <button class="tab" data-src="tabs/08-watch.html"><span class="n">08</span> watchOS + Live Activity</button>
    </div>

    <div class="group">
      <div class="group-label">Reference</div>
      <button class="tab" data-src="tabs/09-components.html"><span class="n">09</span> Component library</button>
      <button class="tab" data-src="tabs/10-copy.html"><span class="n">10</span> Copy deck</button>
      <button class="tab" data-src="tabs/11-motion.html"><span class="n">11</span> Motion specs</button>
    </div>
  </aside>

  <main class="content">
    <iframe id="stage" src="tabs/00-system.html" title="content"></iframe>
  </main>
</div>

<footer class="foot">low-fi wireframes — coral accents mark hero / brand moments only</footer>

<script>
  const stage = document.getElementById('stage');
  document.querySelectorAll('button.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('button.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      stage.src = btn.dataset.src;
    });
  });
</script>
</body>
</html>
